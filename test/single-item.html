<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic</title>
  <script src="../dist/tempis_timeline.js"></script>
</head>
<style>
  html {
    background-color: #ebebeb;
  }
  .canvas-container {
    width: 100%;
    height: 600px;
    resize: both;
    overflow: hidden;
  }
</style>
<body>
  <div class="canvas-container">
    <canvas id="canvas">
  </div>
</body>
<script>
  // Create our timeline options.
  const timelineOptions = {
    responsive: true,
    range: {
      position: "bottom"
    },
    font: {
      size: 14
    },
    items: [
      { 
        id: 0,
        label: "sleeping",
        start: new Date("Thu Jan 23 2025 00:00:00 GMT+0000"),
        end: new Date("Thu Jan 23 2025 08:30:00 GMT+0000"),
        grouping: "Nik's Day"
      }
    ]
  };

  // Create our timeline and stick a reference to it on the window for easy access.
  window["timeline"] = new tempis_timeline.TempisTimeline("#canvas", timelineOptions);
</script>
</html>
