<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Timeline Playground</title>
  <script src="tempis_timeline.min.js"></script>
</head>
<style>
  * {
    box-sizing: border-box;
  }
  
  html {
    background-color: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    margin: 0;
    padding: 0;
  }
  
  body {
    margin: 0;
    padding: 20px;
    display: flex;
    gap: 20px;
    height: 100vh;
  }
  
  .menu-toggle {
    display: none;
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1001;
    background: #9C27B0;
    color: white;
    border: none;
    border-radius: 8px;
    width: 48px;
    height: 48px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    font-size: 24px;
    align-items: center;
    justify-content: center;
  }
  
  .menu-toggle:hover {
    background: #7B1FA2;
  }
  
  @media (max-width: 768px) {
    body {
      padding: 0;
      gap: 0;
    }
    
    .menu-toggle {
      display: flex;
    }
    
    .sidebar {
      position: fixed;
      top: 0;
      left: -100%;
      height: 100vh;
      width: 85%;
      max-width: 320px;
      z-index: 1000;
      border-radius: 0;
      transition: left 0.3s ease;
      box-shadow: 2px 0 8px rgba(0,0,0,0.2);
    }
    
    .sidebar.open {
      left: 0;
    }
    
    .main-content {
      width: 100%;
      padding: 80px 10px 10px 10px;
    }
    
    .canvas-container {
      border-radius: 4px;
    }
  }
  
  .sidebar-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 999;
  }
  
  .sidebar-overlay.active {
    display: block;
  }
  
  .sidebar {
    width: 320px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    padding: 20px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  
  /* Passive scrollbar - only visible on hover */
  .sidebar::-webkit-scrollbar {
    width: 8px;
  }
  
  .sidebar::-webkit-scrollbar-track {
    background: transparent;
  }
  
  .sidebar::-webkit-scrollbar-thumb {
    background: transparent;
    border-radius: 4px;
  }
  
  .sidebar:hover::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.2);
  }
  
  .sidebar::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 0, 0, 0.3);
  }
  
  /* Firefox scrollbar styling */
  .sidebar {
    scrollbar-width: thin;
    scrollbar-color: transparent transparent;
  }
  
  .sidebar:hover {
    scrollbar-color: rgba(0, 0, 0, 0.2) transparent;
  }
  
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
  }
  
  .canvas-container {
    width: 100%;
    height: 100%;
    background: white;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    overflow: hidden;
    resize: both;
    min-width: 300px;
    min-height: 300px;
    max-width: 100%;
    max-height: 100%;
    position: relative;
  }
  
  .canvas-container canvas {
    display: block;
    box-sizing: border-box;
  }
  
  h2 {
    margin: 0 0 20px 0;
    font-size: 20px;
    color: #333;
    border-bottom: 2px solid #e0e0e0;
    padding-bottom: 10px;
  }
  
  h3 {
    margin: 20px 0 10px 0;
    font-size: 14px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .control-group {
    margin-bottom: 16px;
  }
  
  .control-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
    color: #444;
  }
  
  .control-group input[type="number"],
  .control-group input[type="text"],
  .control-group select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
  }
  
  .control-group input[type="range"] {
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: #e0e0e0;
    outline: none;
    -webkit-appearance: none;
  }
  
  .control-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #9C27B0;
    cursor: pointer;
  }
  
  .control-group input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #9C27B0;
    cursor: pointer;
    border: none;
  }
  
  .control-group label span {
    font-weight: 600;
    color: #9C27B0;
  }
  
  .control-group input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
  }
  
  .checkbox-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .checkbox-wrapper label {
    margin: 0;
    cursor: pointer;
  }
  
  .radio-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  .radio-option {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .radio-option input[type="radio"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
  }
  
  .radio-option label {
    margin: 0;
    font-weight: normal;
    cursor: pointer;
  }
  
  button {
    width: 100%;
    padding: 10px;
    background: #2196F3;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  
  button:hover {
    background: #1976D2;
  }
  
  button:active {
    background: #0D47A1;
  }
  
  .info-box {
    background: #e3f2fd;
    padding: 12px;
    border-radius: 4px;
    border-left: 4px solid #2196F3;
    font-size: 12px;
    color: #555;
    margin-top: 20px;
  }
  
  .divider {
    height: 1px;
    background: #e0e0e0;
    margin: 20px 0;
  }
  
  .dialog-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  
  .dialog-overlay.active {
    display: flex;
  }
  
  .dialog {
    background: white;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    padding: 24px;
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }
  
  .dialog h2 {
    margin: 0 0 16px 0;
    font-size: 20px;
    color: #333;
  }
  
  .dialog textarea {
    width: 100%;
    min-height: 300px;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    resize: vertical;
    margin-bottom: 16px;
  }
  
  .dialog-buttons {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
  }
  
  .dialog-buttons button {
    width: auto;
    min-width: 100px;
  }
  
  .dialog-buttons button.secondary {
    background: #757575;
  }
  
  .dialog-buttons button.secondary:hover {
    background: #616161;
  }
  
  .error-message {
    color: #f44336;
    font-size: 13px;
    margin-bottom: 12px;
    display: none;
  }
  
  .error-message.active {
    display: block;
  }
</style>
<body>
  <button class="menu-toggle" id="menuToggle">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="sidebar" id="sidebar">
    <h3 style="margin-top:0px;">Data</h3>
    <div class="control-group">
      <label>Number of Items</label>
      <input type="number" id="itemCount" value="100" min="1" max="1000">
    </div>
    
    <div class="control-group">
      <label>Number of Groups</label>
      <input type="number" id="groupCount" value="5" min="1" max="10">
    </div>
    
    <div class="control-group">
      <label>Number of Categories</label>
      <input type="number" id="categoryCount" value="5" min="0" max="20">
    </div>
    
    <div class="control-group">
      <label>PIT Item Ratio (%)</label>
      <input type="number" id="pitRatio" value="30" min="0" max="100">
    </div>
    
    <div class="control-group">
      <button id="setItemsBtn" style="background: #9C27B0;">Set Items (JSON)</button>
    </div>
    
    <div class="divider"></div>
    
    <h3>Layout</h3>
    <div class="control-group">
      <label>Stack Mode</label>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" id="stackCompact" name="stackMode" value="compact">
          <label for="stackCompact">Compact</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="stackStable" name="stackMode" value="stable" checked>
          <label for="stackStable">Stable</label>
        </div>
      </div>
    </div>
    
    <div class="control-group">
      <label>Vertical Fill</label>
      <select id="verticalFill">
        <option value="content">Content</option>
        <option value="fill-canvas">Fill Canvas</option>
        <option value="grow-canvas">Grow Canvas</option>
      </select>
    </div>
    
    <div class="control-group">
      <div class="checkbox-wrapper">
        <input type="checkbox" id="responsive" checked>
        <label for="responsive">Responsive</label>
      </div>
    </div>
    
    <div class="control-group">
      <div class="checkbox-wrapper">
        <input type="checkbox" id="rtl">
        <label for="rtl">Right-to-Left</label>
      </div>
    </div>
    
    <div class="divider"></div>
    
    <h3>Range</h3>
    <div class="control-group">
      <label>Position</label>
      <select id="rangePosition">
        <option value="top">Top</option>
        <option value="bottom" selected>Bottom</option>
        <option value="both">Both</option>
        <option value="none">None</option>
      </select>
    </div>
    
    <div class="control-group">
      <div class="checkbox-wrapper">
        <input type="checkbox" id="rangeFixed">
        <label for="rangeFixed">Fixed Range</label>
      </div>
    </div>
    
    <div class="control-group">
      <div class="checkbox-wrapper">
        <input type="checkbox" id="zoomEnabled" checked>
        <label for="zoomEnabled">Zoom Enabled</label>
      </div>
    </div>
    
    <div class="divider"></div>
    
    <h3>Legend</h3>
    <div class="control-group">
      <label>Position</label>
      <select id="legendPosition">
        <option value="top">Top</option>
        <option value="bottom" selected>Bottom</option>
        <option value="none">None</option>
      </select>
    </div>
    
    <div class="control-group">
      <label>Alignment</label>
      <select id="legendAlignment">
        <option value="start">Start</option>
        <option value="center" selected>Center</option>
        <option value="end">End</option>
      </select>
    </div>
    
    <div class="divider"></div>
    
    <h3>Selection</h3>
    <div class="control-group">
      <label>Mode</label>
      <select id="selectionMode">
        <option value="none" selected>None</option>
        <option value="single">Single</option>
        <option value="multi">Multi</option>
      </select>
    </div>
    
    <div class="divider"></div>
    
    <h3>Style</h3>
    <div class="control-group">
      <label>Font Size: <span id="fontSizeValue">14</span>px</label>
      <input type="range" id="fontSize" min="8" max="28" value="14" step="1">
    </div>
    
    <div class="control-group">
      <label>Item Padding: <span id="itemPaddingValue">10</span>px</label>
      <input type="range" id="itemPadding" min="5" max="25" value="10" step="1">
    </div>
    
    <div class="control-group">
      <label>Border Radius: <span id="borderRadiusValue">5</span>px</label>
      <input type="range" id="borderRadius" min="0" max="30" value="5" step="1">
    </div>
    
    <div class="control-group">
      <label>Border Thickness: <span id="borderThicknessValue">0</span>px</label>
      <input type="range" id="borderThickness" min="0" max="5" value="0" step="1">
    </div>
    
    <div class="divider"></div>
    
    <h3>Tooltip</h3>
    <div class="control-group">
      <div class="checkbox-wrapper">
        <input type="checkbox" id="tooltipEnabled" checked>
        <label for="tooltipEnabled">Enabled</label>
      </div>
    </div>
    
    <div class="control-group">
      <label>Overflow Behavior</label>
      <select id="tooltipOverflow">
        <option value="none">None</option>
        <option value="canvas" selected>Canvas</option>
        <option value="viewport">Viewport</option>
      </select>
    </div>
  </div>
  
  <div class="main-content">
    <div class="canvas-container">
      <canvas id="canvas"></canvas>
    </div>
  </div>
  
  <!-- Set Items Dialog -->
  <div class="dialog-overlay" id="setItemsDialog">
    <div class="dialog">
      <h2>Set Items (JSON)</h2>
      <div class="error-message" id="jsonError"></div>
      <textarea id="itemsJson" placeholder='[
  {
    "id": 1,
    "label": "Item 1",
    "start": "2024-01-15T10:00:00",
    "end": "2024-01-20T15:00:00",
    "category": "Category-1",
    "grouping": "Group-1"
  }
]'></textarea>
      <div class="dialog-buttons">
        <button class="secondary" id="cancelSetItems">Cancel</button>
        <button id="applySetItems" style="background: #9C27B0;">Apply</button>
      </div>
    </div>
  </div>
</body>
<script>
  function getRandomItem(array) {
    return array[Math.floor(Math.random() * array.length)];
  }

  function getRandomDatePeriod(startDate, endDate) {
    const start = startDate.getTime();
    const end = endDate.getTime();
    const t1 = start + Math.random() * (end - start);
    const t2 = start + Math.random() * (end - start);
    return {
      start: new Date(Math.min(t1, t2)),
      end: new Date(Math.max(t1, t2))
    };
  }

  function generateCategories(categoryCount) {
    const colors = [
      "#4CAF50", "#2196F3", "#FF9800", "#E91E63", "#9C27B0",
      "#00BCD4", "#FFEB3B", "#795548", "#607D8B", "#F44336"
    ];
    
    return Array.from({ length: categoryCount }, (_, i) => ({
      name: `Category-${i + 1}`,
      label: `Category ${i + 1}`,
      style: { backgroundColor: colors[i % colors.length] }
    }));
  }

  function generateItems(itemCount, groupCount, categoryCount, pitRatio) {
    const minDate = new Date("2024-01-01T00:00:00");
    const maxDate = new Date("2024-03-01T00:00:00");
    const categories = Array.from({ length: categoryCount }, (_, i) => `Category-${i + 1}`);
    const groups = Array.from({ length: groupCount }, (_, i) => `Group-${i + 1}`);
    const items = [];

    for (let i = 0; i < itemCount; i++) {
      const randomDatePeriod = getRandomDatePeriod(minDate, maxDate);
      const isPit = Math.random() * 100 < pitRatio;

      items.push({
        id: i,
        label: `Item ${i}`,
        start: randomDatePeriod.start,
        end: isPit ? undefined : randomDatePeriod.end,
        category: getRandomItem(categories),
        grouping: getRandomItem(groups),
      });
    }

    return items;
  }

  let timeline = null;
  let currentItems = [];
  let lastDataConfig = { itemCount: 0, groupCount: 0, categoryCount: 0, pitRatio: 0 };

  function getTimelineOptions() {
    const itemCount = parseInt(document.getElementById('itemCount').value);
    const groupCount = parseInt(document.getElementById('groupCount').value);
    const categoryCount = parseInt(document.getElementById('categoryCount').value);
    const pitRatio = parseInt(document.getElementById('pitRatio').value);
    
    // Only regenerate items if data configuration changed
    if (currentItems.length === 0 ||
        lastDataConfig.itemCount !== itemCount ||
        lastDataConfig.groupCount !== groupCount ||
        lastDataConfig.categoryCount !== categoryCount ||
        lastDataConfig.pitRatio !== pitRatio) {
      currentItems = generateItems(itemCount, groupCount, categoryCount, pitRatio);
      lastDataConfig = { itemCount, groupCount, categoryCount, pitRatio };
      console.log('Items regenerated:', itemCount);
    }
    
    const items = currentItems;

    return {
      responsive: document.getElementById('responsive').checked,
      rtl: document.getElementById('rtl').checked,
      stackMode: document.querySelector('input[name="stackMode"]:checked').value,
      verticalFill: document.getElementById('verticalFill').value,
      selection: document.getElementById('selectionMode').value,
      style: {
        font: {
          size: parseInt(document.getElementById('fontSize').value)
        },
        item: {
          padding: parseInt(document.getElementById('itemPadding').value),
          borderRadius: parseInt(document.getElementById('borderRadius').value),
          borderThickness: parseInt(document.getElementById('borderThickness').value) || undefined,
          borderColor: parseInt(document.getElementById('borderThickness').value) > 0 ? '#333333' : undefined
        }
      },
      range: {
        position: document.getElementById('rangePosition').value,
        fixed: document.getElementById('rangeFixed').checked,
        zoom: {
          enabled: document.getElementById('zoomEnabled').checked
        }
      },
      legend: {
        position: document.getElementById('legendPosition').value,
        alignment: document.getElementById('legendAlignment').value
      },
      tooltip: {
        enabled: document.getElementById('tooltipEnabled').checked,
        overflowBehavior: document.getElementById('tooltipOverflow').value
      },
      categories: generateCategories(categoryCount),
      items
    };
  }

  function regenerateTimeline() {
    // Destroy existing timeline
    if (timeline) {
      timeline.destroy();
    }

    // Create new timeline with current settings
    const options = getTimelineOptions();
    timeline = new tempis_timeline.TempisTimeline("#canvas", options);
    window["timeline"] = timeline;
    
    console.log('Timeline regenerated with tooltip enabled:', options.tooltip.enabled);
  }

  // Initialize timeline on load
  regenerateTimeline();

  // Add event listeners to all controls
  document.querySelectorAll('input, select').forEach(control => {
    control.addEventListener('change', regenerateTimeline);
  });

  // Add input event listeners for range sliders to update value displays in real-time
  document.getElementById('fontSize').addEventListener('input', (e) => {
    document.getElementById('fontSizeValue').textContent = e.target.value;
  });
  
  document.getElementById('itemPadding').addEventListener('input', (e) => {
    document.getElementById('itemPaddingValue').textContent = e.target.value;
  });
  
  document.getElementById('borderRadius').addEventListener('input', (e) => {
    document.getElementById('borderRadiusValue').textContent = e.target.value;
  });
  
  document.getElementById('borderThickness').addEventListener('input', (e) => {
    document.getElementById('borderThicknessValue').textContent = e.target.value;
  });

  // Set Items Dialog handlers
  const setItemsDialog = document.getElementById('setItemsDialog');
  const setItemsBtn = document.getElementById('setItemsBtn');
  const cancelSetItems = document.getElementById('cancelSetItems');
  const applySetItems = document.getElementById('applySetItems');
  const itemsJsonTextarea = document.getElementById('itemsJson');
  const jsonError = document.getElementById('jsonError');

  setItemsBtn.addEventListener('click', () => {
    setItemsDialog.classList.add('active');
    jsonError.classList.remove('active');
    jsonError.textContent = '';
  });

  cancelSetItems.addEventListener('click', () => {
    setItemsDialog.classList.remove('active');
  });

  // Close dialog when clicking outside
  setItemsDialog.addEventListener('click', (e) => {
    if (e.target === setItemsDialog) {
      setItemsDialog.classList.remove('active');
    }
  });

  applySetItems.addEventListener('click', () => {
    try {
      const itemsJson = itemsJsonTextarea.value.trim();
      
      if (!itemsJson) {
        throw new Error('Please enter JSON data');
      }

      const items = JSON.parse(itemsJson);

      if (!Array.isArray(items)) {
        throw new Error('JSON must be an array of items');
      }

      // Validate items have required fields
      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        if (!item.id && item.id !== 0) {
          throw new Error(`Item at index ${i} is missing required field: id`);
        }
        if (!item.start) {
          throw new Error(`Item at index ${i} is missing required field: start`);
        }
      }

      // Extract unique categories from the items
      const uniqueCategories = new Set();
      items.forEach(item => {
        if (item.category) {
          uniqueCategories.add(item.category);
        }
      });

      // Generate category definitions ONLY for categories found in the JSON items
      const colors = [
        "#4CAF50", "#2196F3", "#FF9800", "#E91E63", "#9C27B0",
        "#00BCD4", "#FFEB3B", "#795548", "#607D8B", "#F44336"
      ];
      
      const categories = Array.from(uniqueCategories).map((catName, i) => ({
        name: catName,
        label: catName.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
        style: { backgroundColor: colors[i % colors.length] }
      }));

      // Destroy the existing timeline
      if (timeline) {
        timeline.destroy();
      }

      // Get current options (for non-data settings like layout, style, etc.)
      const options = getTimelineOptions();
      
      // Override with custom items and categories from JSON
      // If no categories in JSON, use empty array (no categories)
      options.items = items;
      options.categories = categories;
      
      // Create new timeline with custom items
      timeline = new tempis_timeline.TempisTimeline("#canvas", options);
      window["timeline"] = timeline;
      
      // Update currentItems to prevent regeneration
      currentItems = items;
      
      console.log('Items set successfully:', items.length, 'items with', categories.length, 'categories');
      
      // Close the dialog
      setItemsDialog.classList.remove('active');
      jsonError.classList.remove('active');
    } catch (error) {
      jsonError.textContent = error.message;
      jsonError.classList.add('active');
      console.error('Error setting items:', error);
    }
  });

  // Mobile menu toggle
  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebarOverlay');

  function openSidebar() {
    sidebar.classList.add('open');
    sidebarOverlay.classList.add('active');
  }

  function closeSidebar() {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('active');
  }

  menuToggle.addEventListener('click', () => {
    if (sidebar.classList.contains('open')) {
      closeSidebar();
    } else {
      openSidebar();
    }
  });

  sidebarOverlay.addEventListener('click', closeSidebar);

  // Close sidebar when clicking on controls (mobile only)
  if (window.innerWidth <= 768) {
    document.querySelectorAll('.sidebar input, .sidebar select, .sidebar button').forEach(control => {
      control.addEventListener('change', () => {
        // Small delay to allow the change to process
        setTimeout(closeSidebar, 100);
      });
    });
  }

</script>
